<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CashReward Pro</title>
    <script src='//libtl.com/sdk.js' data-zone='11214225' data-sdk='show_11214225'></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --accent: #fb923c; --bg: #050505; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #fff; }
        .glass { background: rgba(23, 23, 23, 0.7); backdrop-filter: blur(20px); border: 1px solid #262626; }
        .gold-gradient { background: linear-gradient(135deg, #fb923c 0%, #d97706 100%); }
        .main-page { display: none; }
        .main-page.active { display: flex; flex-direction: column; }
        .sub-page { display: none; }
        .sub-page.active { display: block; animation: fadeIn 0.3s ease; }
        .nav-btn { color: #525252; transition: 0.3s; }
        .nav-active { color: #fb923c; }
        input { background: #111 !important; border: 1px solid #222 !important; color: white !important; outline: none; }
        input:focus { border-color: var(--accent) !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="max-w-md mx-auto">

    <div id="loader" class="fixed inset-0 bg-[#050505] flex items-center justify-center z-[100]">
        <div class="w-10 h-10 border-2 border-orange-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <!-- Auth Section -->
    <div id="auth-section" class="min-h-screen p-8 justify-center main-page">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black tracking-tighter text-orange-500 italic">CASHREWARD</h1>
            <p class="text-zinc-500 text-xs mt-2 uppercase font-bold tracking-widest">Premium Rewards</p>
        </div>
        
        <div id="login-view" class="space-y-4">
            <input id="login-email" type="email" placeholder="Email" class="w-full p-4 rounded-2xl">
            <input id="login-password" type="password" placeholder="Password" class="w-full p-4 rounded-2xl">
            <button id="login-btn" class="w-full p-4 rounded-2xl gold-gradient text-black font-black">LOG IN</button>
            <p class="text-center text-xs text-zinc-500">Don't have an account? <span id="to-signup" class="text-orange-500 font-bold cursor-pointer underline">Register</span></p>
        </div>

        <div id="signup-view" class="hidden space-y-4">
            <input id="signup-name" type="text" placeholder="Full Name" class="w-full p-4 rounded-2xl">
            <input id="signup-email" type="email" placeholder="Email Address" class="w-full p-4 rounded-2xl">
            <input id="signup-password" type="password" placeholder="Create Password" class="w-full p-4 rounded-2xl">
            <button id="signup-btn" class="w-full p-4 rounded-2xl gold-gradient text-black font-black">CREATE ACCOUNT</button>
            <p class="text-center text-xs text-zinc-500">Member already? <span id="to-login" class="text-orange-500 font-bold cursor-pointer underline">Login</span></p>
        </div>
    </div>

    <!-- App Container -->
    <div id="app-container" class="min-h-screen main-page">
        <header class="p-5 flex justify-between items-center bg-zinc-950 border-b border-zinc-900 sticky top-0 z-50">
            <span class="font-black text-xl italic uppercase tracking-tighter">CASH<span class="text-orange-500">REWARD</span></span>
            <div class="bg-zinc-900 px-4 py-1.5 rounded-full border border-zinc-800 flex items-center gap-2">
                <span class="text-[10px] font-bold text-zinc-500">WALLET:</span>
                <span class="text-orange-500 font-black text-xs">₹ <span id="rupee-bal">0.00</span></span>
            </div>
        </header>

        <main class="flex-grow p-5 space-y-8">
            <div id="home-page" class="sub-page active space-y-8">
                <!-- Large Balance Card -->
                <div class="card-bg p-8 rounded-[2.5rem] text-center shadow-2xl relative overflow-hidden">
                    <p class="text-zinc-600 text-[10px] font-black uppercase tracking-widest mb-1">Total Coins</p>
                    <h2 class="text-6xl font-black tracking-tighter" id="coin-bal">0</h2>
                </div>

                <!-- Ad Tasks -->
                <div class="space-y-4">
                    <div class="glass p-6 rounded-3xl flex justify-between items-center" onclick="watchAd('pop', 50)">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-orange-500/10 rounded-2xl flex items-center justify-center text-orange-500"><i data-lucide="play"></i></div>
                            <div><p class="font-bold text-sm">Standard Task</p><p class="text-[10px] text-zinc-500">+50 Coins</p></div>
                        </div>
                        <button class="bg-zinc-800 px-4 py-2 rounded-xl text-[10px] font-bold">Watch</button>
                    </div>

                    <div class="glass p-6 rounded-3xl flex justify-between items-center" onclick="watchAd('inter', 100)">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 gold-gradient rounded-2xl flex items-center justify-center text-black shadow-lg shadow-orange-500/20"><i data-lucide="zap"></i></div>
                            <div><p class="font-bold text-sm">Premium Task</p><p class="text-[10px] text-zinc-500">+100 Coins</p></div>
                        </div>
                        <button class="bg-white text-black px-4 py-2 rounded-xl text-[10px] font-bold">Watch</button>
                    </div>
                </div>

                <!-- Challenges Tab Logic Here -->
                <div id="challenges-section" class="space-y-4">
                    <h3 class="font-bold text-gray-400 uppercase text-xs tracking-widest px-2">Live Challenges</h3>
                    <div id="challenge-list" class="space-y-4"></div>
                </div>
            </div>

            <!-- Wallet Page -->
            <div id="wallet-page" class="sub-page">
                <h2 class="text-2xl font-black italic mb-6">REDEEM EARNINGS</h2>
                <div class="glass p-8 rounded-[2.5rem] space-y-5">
                    <div>
                        <label class="text-[10px] font-bold text-zinc-500 ml-1">REDEMPTION TYPE</label>
                        <select id="w-type" class="w-full p-4 rounded-xl bg-black border border-zinc-800 text-sm font-bold mt-1 outline-none">
                            <option value="coins">Coins to Coins</option>
                            <option value="rupees">₹ Wallet Cashout</option>
                        </select>
                    </div>
                    <input id="w-amt" type="number" placeholder="Enter Amount" class="w-full p-4 rounded-xl">
                    <input id="w-upi" type="text" placeholder="UPI ID or Paytm Number" class="w-full p-4 rounded-xl">
                    <button id="withdraw-btn" class="w-full p-5 rounded-2xl gold-gradient text-black font-black uppercase text-sm">Submit Request</button>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 p-5 bg-black/90 backdrop-blur-xl border-t border-zinc-900 grid grid-cols-3 z-[90]">
            <button onclick="navigateTo('home-page')" class="nav-btn nav-active flex flex-col items-center gap-1" data-id="home-page"><i data-lucide="grid"></i><span class="text-[9px] font-bold">HOME</span></button>
            <button onclick="navigateTo('wallet-page')" class="nav-btn flex flex-col items-center gap-1" data-id="wallet-page"><i data-lucide="wallet"></i><span class="text-[9px] font-bold">WALLET</span></button>
            <button id="logout-btn" class="nav-btn flex flex-col items-center gap-1 text-red-500/50"><i data-lucide="log-out"></i><span class="text-[9px] font-bold uppercase">EXIT</span></button>
        </nav>
    </div>

    <!-- Global Alert -->
    <div id="alert-box" class="hidden fixed inset-0 bg-black/95 z-[200] flex flex-col items-center justify-center p-12 text-center">
        <p id="alert-msg" class="text-2xl font-black mb-10 leading-tight italic uppercase"></p>
        <button onclick="closeAlert()" class="gold-gradient px-12 py-3 rounded-xl text-black font-black">DISMISS</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, addDoc, collection, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCAVkef_IKMFfnvY3jonZthtJlz8_8W1I8", authDomain: "task-and-earn-131ce.firebaseapp.com", projectId: "task-and-earn-131ce", storageBucket: "task-and-earn-131ce.firebasestorage.app", messagingSenderId: "769440982357", appId: "1:769440982357:web:e80bda0aeaeaf8a7f63bdc" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let userState = null;

        window.onload = () => { lucide.createIcons(); onAuthStateChanged(auth, initApp); };

        async function initApp(user) {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    if (snap.exists()) {
                        userState = snap.data();
                        document.getElementById('coin-bal').innerText = (userState.coins || 0).toLocaleString();
                        document.getElementById('rupee-bal').innerText = (userState.rupees || 0).toFixed(2);
                        showMain('app-container');
                        loadChallenges();
                    } else {
                        const code = Math.random().toString(36).substring(7).toUpperCase();
                        setDoc(doc(db, "users", user.uid), { name: "User", email: user.email, coins: 50, rupees: 0, referral: code, isBlocked: false });
                    }
                });
            } else { showMain('auth-section'); }
            document.getElementById('loader').style.display = 'none';
        }

        async function loadChallenges() {
            onSnapshot(collection(db, "challenges"), (snap) => {
                const list = document.getElementById('challenge-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const c = d.data();
                    list.innerHTML += `<div class="glass p-5 rounded-3xl space-y-3">
                        <div class="flex justify-between items-start"><h4 class="font-bold">${c.title}</h4><span class="text-[10px] bg-orange-500/20 text-orange-500 px-2 py-0.5 rounded font-black tracking-widest">ACTIVE</span></div>
                        <p class="text-xs text-zinc-500 leading-relaxed">${c.desc}</p>
                        <div class="flex justify-between items-center text-xs font-black">
                            <span>REWARD: <span class="text-orange-500">₹${c.reward}</span></span>
                            <span>${c.target} COINS</span>
                        </div>
                        <button onclick="joinChallenge('${d.id}')" class="w-full py-3 bg-zinc-800 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-zinc-700">Participate</button>
                    </div>`;
                });
            });
        }

        window.watchAd = (type, amt) => {
            const prom = type === 'pop' ? window.show_11214225('pop') : window.show_11214225();
            prom.then(async () => {
                const newCoins = (userState.coins || 0) + amt;
                await updateDoc(doc(db, "users", auth.currentUser.uid), { coins: newCoins });
                showAlert("AWARDED: +" + amt + " COINS");
            }).catch(() => showAlert("Ad Service Offline"));
        };

        window.joinChallenge = async (id) => {
            await addDoc(collection(db, "userChallenges"), { userId: auth.currentUser.uid, challengeId: id, status: 'pending', joinedAt: serverTimestamp() });
            showAlert("CHALLENGE JOINED! CHECK INSTRUCTIONS.");
        };

        // --- AUTH CLICKS ---
        document.getElementById('login-btn').onclick = async () => {
            const e = document.getElementById('login-email').value;
            const p = document.getElementById('login-password').value;
            try { await signInWithEmailAndPassword(auth, e, p); } catch(err) { showAlert(err.message); }
        };

        document.getElementById('signup-btn').onclick = async () => {
            const n = document.getElementById('signup-name').value;
            const e = document.getElementById('signup-email').value;
            const p = document.getElementById('signup-password').value;
            try { await createUserWithEmailAndPassword(auth, e, p); } catch(err) { showAlert(err.message); }
        };

        document.getElementById('withdraw-btn').onclick = async () => {
            const amt = parseInt(document.getElementById('w-amt').value);
            const type = document.getElementById('w-type').value;
            const pid = document.getElementById('w-upi').value;
            if(!amt || !pid) return showAlert("Empty fields.");
            await addDoc(collection(db, "withdrawals"), { userId: auth.currentUser.uid, amount: amt, type: type, upi: pid, status: 'pending', date: serverTimestamp() });
            showAlert("REQUESTED SUCCESSFULLY.");
        };

        document.getElementById('logout-btn').onclick = () => signOut(auth);
        document.getElementById('to-signup').onclick = () => { document.getElementById('login-view').classList.add('hidden'); document.getElementById('signup-view').classList.remove('hidden'); };
        document.getElementById('to-login').onclick = () => { document.getElementById('signup-view').classList.add('hidden'); document.getElementById('login-view').classList.remove('hidden'); };

        window.navigateTo = (id) => {
            document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.toggle('nav-active', n.dataset.id === id));
        };

        function showMain(id) {
            document.querySelectorAll('.main-page').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function showAlert(m) { document.getElementById('alert-msg').innerText = m; document.getElementById('alert-box').classList.remove('hidden'); }
        window.closeAlert = () => document.getElementById('alert-box').classList.add('hidden');
    </script>
</body>
</html>
