<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Rewards Pro</title>
    
    <!-- MONETAG GLOBAL SDK -->
    <script src='//libtl.com/sdk.js' data-zone='11214225' data-sdk='show_11214225'></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --accent: #fb923c; --bg: #050505; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #fff; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(23, 23, 23, 0.8); backdrop-filter: blur(20px); border: 1px solid #262626; }
        .gold-grad { background: linear-gradient(135deg, #fb923c 0%, #d97706 100%); }
        .main-view { display: none; min-height: 100vh; }
        .main-view.active { display: flex; flex-direction: column; }
        .tab-view { display: none; }
        .tab-view.active { display: block; animation: tabIn 0.4s ease; }
        @keyframes tabIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn { color: #404040; transition: 0.3s; }
        .nav-active { color: var(--accent); font-weight: bold; }
        input { background: #0a0a0a !important; border: 1px solid #222 !important; color: #fff !important; outline: none; }
    </style>
</head>
<body class="max-w-md mx-auto">

    <!-- Loading Preloader -->
    <div id="loading_screen" class="fixed inset-0 bg-[#050505] flex items-center justify-center z-[9999]">
        <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-orange-500"></div>
    </div>

    <!-- Auth View -->
    <div id="view_login" class="main-view p-8 justify-center">
        <h1 class="text-4xl font-black italic text-orange-500 text-center mb-10 uppercase tracking-tighter">Elite Rewards</h1>
        
        <div id="login_form" class="space-y-4">
            <input id="u_email" type="email" placeholder="Email" class="w-full p-4 rounded-2xl border">
            <input id="u_pass" type="password" placeholder="Password" class="w-full p-4 rounded-2xl border">
            <button onclick="performLogin()" class="w-full p-4 gold-grad text-black font-black rounded-2xl shadow-xl active:scale-95 transition-all">SIGN IN</button>
            <p class="text-center text-xs text-zinc-500 mt-4 underline cursor-pointer" onclick="toggleAuthScreens(true)">Register Now</p>
        </div>

        <div id="signup_form" class="hidden space-y-4">
            <input id="u_reg_name" type="text" placeholder="Full Name" class="w-full p-4 rounded-2xl">
            <input id="u_reg_email" type="email" placeholder="Email Address" class="w-full p-4 rounded-2xl">
            <input id="u_reg_pass" type="password" placeholder="Password" class="w-full p-4 rounded-2xl">
            <button onclick="performSignup()" class="w-full p-4 gold-grad text-black font-black rounded-2xl active:scale-95 transition-all">JOIN NOW</button>
            <p class="text-center text-xs text-zinc-500 mt-4 underline cursor-pointer" onclick="toggleAuthScreens(false)">Back to Login</p>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="view_dashboard" class="main-view pb-32">
        <header class="p-6 bg-zinc-950/90 backdrop-blur-md flex justify-between items-center border-b border-zinc-900 sticky top-0 z-50">
            <h1 class="font-black italic text-xl tracking-tight">ELITE<span class="text-orange-500">PRO</span></h1>
            <div class="px-4 py-1.5 bg-zinc-900 border border-zinc-800 rounded-full font-black text-xs text-orange-500">
                ₹ <span id="span_rupee">0.00</span>
            </div>
        </header>

        <main class="flex-grow p-6">
            <!-- Home: Core Earnings -->
            <div id="tab_home" class="tab-view active space-y-6">
                <div class="glass p-10 rounded-[3rem] text-center border-orange-500/10 border shadow-2xl">
                    <p class="text-zinc-600 text-[10px] font-black uppercase mb-1">Total Balance</p>
                    <h2 class="text-6xl font-black tracking-tighter" id="span_coins">0</h2>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div onclick="earnRewardedAd(50)" class="glass p-6 rounded-3xl text-center active:bg-zinc-900 transition-all border border-zinc-800">
                        <i data-lucide="play" class="mx-auto mb-2 text-orange-500 w-8 h-8"></i>
                        <p class="font-black text-[10px] uppercase">Reward ad</p>
                    </div>
                    <div onclick="claimDailyBonus()" class="glass p-6 rounded-3xl text-center border-l-4 border-orange-500 active:scale-95 transition-all">
                        <i data-lucide="award" class="mx-auto mb-2 text-orange-500 w-8 h-8"></i>
                        <p class="font-black text-[10px] uppercase tracking-tighter">Daily bonus</p>
                    </div>
                </div>

                <div onclick="earnRewardedAd(100)" class="w-full glass p-6 rounded-[2rem] flex justify-between items-center bg-gradient-to-br from-zinc-900 to-transparent">
                    <p class="font-bold text-sm">Premium Video Task</p>
                    <span class="bg-orange-500 text-black px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest">+100</span>
                </div>
            </div>

            <!-- Tasks Tab -->
            <div id="tab_tasks" class="tab-view space-y-6">
                <h2 class="text-2xl font-black italic">ELITE MISSIONS</h2>
                <div id="div_challenges_list" class="space-y-4"></div>
            </div>

            <!-- Tracker -->
            <div id="tab_tracking" class="tab-view text-center space-y-8">
                <div class="glass p-10 rounded-[3.5rem] border border-orange-500/20">
                    <h3 class="font-black text-2xl" id="track_perc">0%</h3>
                    <p class="text-zinc-500 text-xs font-bold uppercase mb-6 tracking-widest">Progress</p>
                    <h4 class="text-4xl font-black text-white" id="track_coins">0</h4>
                    <p class="text-[10px] font-bold text-zinc-700 uppercase mt-1 mb-8 tracking-widest">Collected after join</p>
                    <button id="btn_claim_tracker" class="w-full py-5 rounded-[2rem] bg-zinc-800 text-zinc-500 font-black cursor-not-allowed">GOAL PENDING</button>
                </div>
                <button onclick="moveToTab('tab_home')" class="text-xs font-bold text-zinc-600 underline uppercase tracking-[3px]">Exit Mission</button>
            </div>

            <!-- Wallet -->
            <div id="tab_wallet" class="tab-view">
                <h2 class="text-2xl font-black mb-8 italic uppercase tracking-tighter">Withdraw Funds</h2>
                <div class="glass p-8 rounded-[3rem] space-y-5 border-zinc-800 border">
                    <input id="in_payout_upi" type="text" placeholder="UPI ID / Number" class="w-full p-4 rounded-xl">
                    <input id="in_payout_amt" type="number" placeholder="Coins/₹" class="w-full p-4 rounded-xl text-xl font-black">
                    <button onclick="handlePayoutWithAd()" class="w-full p-5 gold-grad text-black font-black rounded-3xl active:scale-95 shadow-xl uppercase">Submit & Cashout</button>
                </div>
            </div>

        </main>

        <!-- Fixed Navbar -->
        <nav class="fixed bottom-6 left-6 right-6 h-20 glass rounded-[2.5rem] flex items-center justify-around z-50 border border-white/5 shadow-2xl">
            <button onclick="moveToTab('tab_home')" class="nav-btn nav-active flex flex-col items-center gap-1" data-id="tab_home"><i data-lucide="layout-grid"></i><span class="text-[8px] font-black uppercase">Home</span></button>
            <button onclick="moveToTab('tab_tasks')" class="nav-btn flex flex-col items-center gap-1" data-id="tab_tasks"><i data-lucide="zap"></i><span class="text-[8px] font-black uppercase">Task</span></button>
            <button onclick="moveToTab('tab_wallet')" class="nav-btn flex flex-col items-center gap-1" data-id="tab_wallet"><i data-lucide="wallet"></i><span class="text-[8px] font-black uppercase">Redeem</span></button>
            <button onclick="handleSignOut()" class="nav-btn flex flex-col items-center gap-1 text-red-500/20"><i data-lucide="power"></i></button>
        </nav>
    </div>

    <!-- Alert Modal -->
    <div id="pop_box" class="hidden fixed inset-0 bg-[#000]/98 backdrop-blur-3xl z-[9999] flex flex-col items-center justify-center p-12 text-center">
        <p id="pop_msg" class="text-2xl font-black mb-10 italic uppercase leading-none text-orange-500 tracking-tighter"></p>
        <button onclick="closePop()" class="gold-grad px-16 py-4 rounded-full text-black font-black uppercase shadow-2xl active:scale-95 transition-all">Okay</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, collection, setDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        // APP CONFIG
        const firebaseConfig = { 
            apiKey: "AIzaSyCAVkef_IKMFfnvY3jonZthtJlz8_8W1I8", 
            authDomain: "task-and-earn-131ce.firebaseapp.com", 
            projectId: "task-and-earn-131ce", 
            storageBucket: "task-and-earn-131ce.firebasestorage.app", 
            messagingSenderId: "769440982357", 
            appId: "1:769440982357:web:e80bda0aeaeaf8a7f63bdc" 
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let localUser = null; let taskTracker = null;

        // AUTH CONTROL
        onAuthStateChanged(auth, u => {
            if (u) {
                onSnapshot(doc(db, "users", u.uid), s => {
                    if (s.exists()) {
                        localUser = s.data();
                        document.getElementById('span_coins').innerText = (localUser.coins || 0).toLocaleString();
                        document.getElementById('span_rupee').innerText = (localUser.rupees || 0).toFixed(2);
                        if(taskTracker) syncProgressUI();
                        switchScreen('view_dashboard');
                        loadChallengeList();
                    } else {
                        setDoc(doc(db, "users", u.uid), { name: "User", email: u.email, coins: 50, rupees: 0, lastCheck: "" });
                    }
                });
            } else { switchScreen('view_login'); }
            document.getElementById('loading_screen').style.display = 'none';
        });

        // 🟢 AD 1: COIN EARNING (NO DISTRACTION POPUP)
        window.earnRewardedAd = (amt) => {
            if(window.show_11214225) {
                window.show_11214225('pop').then(async () => {
                    await updateDoc(doc(db, "users", auth.currentUser.uid), { coins: (localUser.coins || 0) + amt });
                    showPop("SUCCESS: +" + amt + " COINS ADDED!");
                }).catch(() => showPop("AD LOADING... RETRY IN SEC"));
            }
        };

        // 🔵 AD 2: NAVIGATION AD (TABS PAR POPUP)
        window.moveToTab = (id) => {
            // Screen Switch Popups (Work-time Ads)
            if(window.show_11214225 && Math.random() > 0.6) {
                window.show_11214225('pop').catch(()=>{}); 
            }
            document.querySelectorAll('.tab-view').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('nav-active', b.dataset.id === id));
        };

        // 🟡 AD 3: WITHDRAW BUTTON (FORCE AD)
        window.handlePayoutWithAd = async () => {
            const amt = parseInt(document.getElementById('in_payout_amt').value);
            const upi = document.getElementById('in_payout_upi').value;
            if(!amt || amt < 10 || !upi) return showPop("FILL PAYOUT DATA (Min 10)");

            // Force non-rewarded popup first
            if(window.show_11214225) {
                showPop("VERIFYING REQUEST...");
                window.show_11214225('pop').finally(async () => {
                    await addDoc(collection(db, "withdrawals"), { userId: auth.currentUser.uid, amount: amt, upi: upi, status: 'pending', date: serverTimestamp() });
                    showPop("WITHDRAWAL QUEUED SUCCESSFUL!");
                });
            }
        };

        // DAILY TASK
        window.claimDailyBonus = async () => {
            const today = new Date().toLocaleDateString();
            if(localUser.lastCheck === today) return showPop("ALREADY COLLECTED");
            await updateDoc(doc(db, "users", auth.currentUser.uid), { coins: localUser.coins + 100, lastCheck: today });
            showPop("DAILY BONUS: +100 COINS");
        };

        // MISSION LOADER
        function loadChallengeList() {
            onSnapshot(collection(db, "challenges"), snap => {
                const box = document.getElementById('div_challenges_list'); box.innerHTML = '';
                snap.forEach(d => {
                    const c = d.data();
                    const el = document.createElement('div');
                    el.className = "glass p-6 rounded-3xl flex justify-between items-center shadow-lg border-white/5 border";
                    el.innerHTML = `<div><p class="font-bold text-xs text-zinc-500 uppercase">${c.title}</p><p class="font-black text-lg">Goal: ${c.target} Coins</p></div>
                        <button class="gold-grad text-black text-[9px] font-black px-6 py-2.5 rounded-full">JOIN</button>`;
                    el.querySelector('button').onclick = () => { taskTracker = { id: d.id, start: localUser.coins, goal: c.target }; moveToTab('tab_tracking'); };
                    box.appendChild(el);
                });
            });
        }

        function syncProgressUI() {
            const curr = (localUser.coins || 0) - taskTracker.start;
            const perc = Math.min(100, Math.floor((curr/taskTracker.goal)*100));
            document.getElementById('track_coins').innerText = curr + " / " + taskTracker.goal;
            document.getElementById('track_perc').innerText = perc + "%";
            if(curr >= taskTracker.goal) {
                const btn = document.getElementById('btn_claim_tracker');
                btn.className = "w-full py-5 rounded-[2.5rem] gold-grad text-black font-black uppercase active:scale-95";
                btn.innerText = "SUBMIT ACHIEVEMENT";
                btn.onclick = async () => {
                    await addDoc(collection(db, "userChallenges"), { userId: auth.currentUser.uid, tid: taskTracker.id, status: 'submitted', date: serverTimestamp() });
                    taskTracker = null; showPop("CHALLENGE SUBMITTED"); moveToTab('tab_home');
                }
            }
        }

        // NAVIGATION & AUTH
        window.performLogin = async () => {
            try { await signInWithEmailAndPassword(auth, u_email.value, u_pass.value); } 
            catch(err) { showPop(err.message); }
        };
        window.performSignup = async () => {
            try { await createUserWithEmailAndPassword(auth, u_reg_email.value, u_reg_pass.value); } 
            catch(err) { showPop(err.message); }
        };
        window.handleSignOut = () => signOut(auth);
        window.toggleAuthScreens = (isReg) => {
            document.getElementById('login_form').classList.toggle('hidden', isReg);
            document.getElementById('signup_form').classList.toggle('hidden', !isReg);
        };
        function switchScreen(id) { document.querySelectorAll('.main-view').forEach(m => m.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        window.showPop = (m) => { document.getElementById('pop_msg').innerText = m; document.getElementById('pop_box').classList.remove('hidden'); }
        window.closePop = () => document.getElementById('pop_box').classList.add('hidden');
        lucide.createIcons();
    </script>
</body>
</html>
