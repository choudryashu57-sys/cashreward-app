<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CashReward Elite</title>
    
    <!-- MONETAG GLOBAL SDK -->
    <script src='//libtl.com/sdk.js' data-zone='11214225' data-sdk='show_11214225'></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f0f0f; color: #ffffff; -webkit-tap-highlight-color: transparent; }
        .card-bg { background-color: #171717; border: 1px solid #262626; }
        .text-accent { color: #fb923c; }
        .btn-accent { background-color: #fb923c; color: #000; font-weight: 800; transition: 0.2s; }
        .btn-accent:active { transform: scale(0.95); }
        .input-field { background-color: #1a1a1a; border: 1px solid #333; color: white; outline: none; }
        .main-page { display: none; opacity: 0; transition: opacity 0.5s ease; }
        .main-page.active { display: flex; flex-direction: column; opacity: 1; }
        .sub-page { display: none; }
        .sub-page.active { display: block; }
        .nav-btn { color: #525252; }
        .nav-active { color: #fb923c; }
    </style>
</head>
<body class="max-w-md mx-auto">

    <!-- Preloader -->
    <div id="loader" class="fixed inset-0 bg-[#0f0f0f] flex items-center justify-center z-[100]">
        <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-orange-500"></div>
    </div>

    <!-- Login/Register (Only showing when user logged out) -->
    <div id="auth-section" class="min-h-screen p-8 justify-center main-page">
        <h1 class="text-4xl font-black text-center mb-8 text-accent italic tracking-tighter uppercase">CASH REWARD</h1>
        <div id="login-view" class="space-y-4">
            <input id="login-email" type="email" placeholder="Email" class="w-full p-4 rounded-2xl input-field">
            <input id="login-password" type="password" placeholder="Password" class="w-full p-4 rounded-2xl input-field">
            <button id="login-btn" class="w-full p-4 rounded-2xl btn-accent">LOG IN</button>
            <p class="text-center text-xs text-zinc-500">No account? <span id="to-signup" class="text-white cursor-pointer underline">Register</span></p>
        </div>
        <div id="signup-view" class="hidden space-y-4">
            <input id="signup-name" type="text" placeholder="Name" class="w-full p-4 rounded-2xl input-field">
            <input id="signup-email" type="email" placeholder="Email" class="w-full p-4 rounded-2xl input-field">
            <input id="signup-password" type="password" placeholder="Password" class="w-full p-4 rounded-2xl input-field">
            <button id="signup-btn" class="w-full p-4 rounded-2xl btn-accent">JOIN NOW</button>
            <p class="text-center text-xs text-zinc-500">Member? <span id="to-login" class="text-white cursor-pointer underline">Log in</span></p>
        </div>
    </div>

    <!-- App Header (Centered, No SMS, No Notification) -->
    <div id="app-container" class="min-h-screen main-page">
        <header class="p-6 bg-zinc-950 flex justify-center border-b border-zinc-900 sticky top-0 z-50">
            <span class="font-black text-xl tracking-tighter italic">CASH <span class="text-accent">REWARD</span></span>
        </header>

        <main class="flex-grow p-6">
            <div id="home-page" class="sub-page active space-y-8">
                <!-- Balanced Display -->
                <div class="card-bg p-8 rounded-[2.5rem] text-center shadow-2xl">
                    <p class="text-zinc-600 text-[10px] font-black uppercase tracking-widest mb-1">Current Coins</p>
                    <h2 class="text-6xl font-black tracking-tighter" id="balance-txt">0</h2>
                </div>

                <!-- Monetag Tasks -->
                <div class="space-y-4">
                    <!-- Standard Rewarded Ad -->
                    <div class="card-bg p-6 rounded-3xl flex justify-between items-center active:bg-zinc-900 transition-all" onclick="playStandardAd()">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-orange-500/10 rounded-2xl flex items-center justify-center">
                                <i data-lucide="play" class="w-5 h-5 text-accent"></i>
                            </div>
                            <div>
                                <h3 class="font-bold">Standard Ad</h3>
                                <p class="text-xs text-zinc-500">+50 Coins</p>
                            </div>
                        </div>
                        <i data-lucide="arrow-right" class="w-4 h-4 text-zinc-800"></i>
                    </div>

                    <!-- Premium Rewarded Ad -->
                    <div class="card-bg p-6 rounded-3xl flex justify-between items-center active:bg-zinc-900 transition-all" onclick="playPremiumAd()">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-orange-500 rounded-2xl flex items-center justify-center text-black">
                                <i data-lucide="zap" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <h3 class="font-bold">Premium Task</h3>
                                <p class="text-xs text-zinc-400">+100 Coins</p>
                            </div>
                        </div>
                        <i data-lucide="arrow-right" class="w-4 h-4 text-zinc-800"></i>
                    </div>
                </div>

                <!-- Native Banner Place -->
                <div id="container-11214225" class="mt-8 border border-dashed border-zinc-800 min-h-[100px] flex items-center justify-center rounded-2xl">
                    <span class="text-[9px] text-zinc-700 tracking-[8px] font-bold">ADVERTISING</span>
                </div>
            </div>

            <!-- Profile and Wallet as Simple Pages -->
            <div id="wallet-page" class="sub-page">
                <h2 class="text-2xl font-black mb-6 italic">REDEEM</h2>
                <div class="card-bg p-6 rounded-3xl space-y-4">
                    <input id="withdraw-amt" type="number" placeholder="Coins" class="w-full p-4 rounded-2xl bg-zinc-900 outline-none text-2xl font-bold">
                    <input id="payment-id" type="text" placeholder="Paytm / UPI ID" class="w-full p-4 rounded-2xl bg-zinc-900 outline-none">
                    <button id="withdraw-btn" class="w-full p-4 rounded-2xl btn-accent">WITHDRAW</button>
                </div>
            </div>

            <div id="profile-page" class="sub-page">
                <div class="card-bg p-8 rounded-[2.5rem] text-center">
                    <h2 id="user-name" class="font-black text-xl mb-1 uppercase">Loading...</h2>
                    <p id="user-email" class="text-zinc-600 text-xs mb-8"></p>
                    <button id="logout-btn" class="w-full py-4 text-red-500 bg-red-500/5 rounded-2xl font-bold">Log out</button>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 p-5 bg-black/90 backdrop-blur-xl border-t border-zinc-900 grid grid-cols-3">
            <button onclick="navigateTo('home-page')" class="nav-btn nav-active flex flex-col items-center gap-1" data-id="home-page"><i data-lucide="home"></i><span class="text-[9px] font-black uppercase">Home</span></button>
            <button onclick="navigateTo('wallet-page')" class="nav-btn flex flex-col items-center gap-1" data-id="wallet-page"><i data-lucide="wallet"></i><span class="text-[9px] font-black uppercase">Wallet</span></button>
            <button onclick="navigateTo('profile-page')" class="nav-btn flex flex-col items-center gap-1" data-id="profile-page"><i data-lucide="user"></i><span class="text-[9px] font-black uppercase">User</span></button>
        </nav>
    </div>

    <!-- Minimal Alert Box -->
    <div id="alert-box" class="hidden fixed inset-0 bg-black/95 z-[200] flex flex-col items-center justify-center p-10 text-center">
        <p id="alert-msg" class="text-2xl font-black mb-10 italic"></p>
        <button onclick="closeAlert()" class="btn-accent px-12 py-3 rounded-2xl">GOT IT</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAVkef_IKMFfnvY3jonZthtJlz8_8W1I8",
            authDomain: "task-and-earn-131ce.firebaseapp.com",
            projectId: "task-and-earn-131ce",
            storageBucket: "task-and-earn-131ce.firebasestorage.app",
            messagingSenderId: "769440982357",
            appId: "1:769440982357:web:e80bda0aeaeaf8a7f63bdc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let userState = null;

        window.onload = () => {
            lucide.createIcons();
            onAuthStateChanged(auth, handleUser);
        };

        async function handleUser(user) {
            if (user) {
                const s = await getDoc(doc(db, "users", user.uid));
                userState = s.exists() ? s.data() : { name: "New User", email: user.email, balance: 50 };
                if(!s.exists()) await setDoc(doc(db, "users", user.uid), userState);
                
                document.getElementById('balance-txt').innerText = userState.balance.toLocaleString();
                document.getElementById('user-name').innerText = userState.name;
                document.getElementById('user-email').innerText = userState.email;
                
                show('app-container');
                initInAppAds(); 
            } else { show('auth-section'); }
            document.getElementById('loader').style.display = 'none';
        }

        // --- AD SYSTEM ---

        function initInAppAds() {
            if (typeof window['show_11214225'] === 'function') {
                console.log("In-App Ad Loading...");
                window['show_11214225']({ type: 'inApp', inAppSettings: { frequency: 2, capping: 0.1, interval: 30, timeout: 5, everyPage: false } });
            }
        }

        window.playStandardAd = () => {
            console.log("Triggering Rewarded Popup...");
            if (typeof window['show_11214225'] === 'function') {
                window['show_11214225']('pop').then(() => { award(50); }).catch(() => customAlert("AD BUSY - RETRY"));
            } else {
                customAlert("AD SERVICE NOT LOADED");
            }
        };

        window.playPremiumAd = () => {
            console.log("Triggering Rewarded Interstitial...");
            if (typeof window['show_11214225'] === 'function') {
                window['show_11214225']().then(() => { award(100); }).catch(() => customAlert("AD ERROR - RETRY"));
            } else {
                customAlert("AD SERVICE OFFLINE");
            }
        };

        async function award(n) {
            const newBal = (userState.balance || 0) + n;
            await updateDoc(doc(db, "users", auth.currentUser.uid), { balance: newBal });
            userState.balance = newBal;
            document.getElementById('balance-txt').innerText = newBal.toLocaleString();
            customAlert("WINNER: +" + n + " COINS");
        }

        // --- CORE UI LOGIC ---

        function show(id) {
            document.querySelectorAll('.main-page').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        window.navigateTo = (p) => {
            document.querySelectorAll('.sub-page').forEach(s => s.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(n => {
                n.classList.remove('nav-active');
                if(n.dataset.id === p) n.classList.add('nav-active');
            });
        };

        document.getElementById('login-btn').onclick = async () => {
            const e = document.getElementById('login-email').value, p = document.getElementById('login-password').value;
            try { await signInWithEmailAndPassword(auth, e, p); } catch(err) { customAlert(err.message); }
        };

        document.getElementById('logout-btn').onclick = () => signOut(auth);
        
        document.getElementById('withdraw-btn').onclick = async () => {
            const amt = parseInt(document.getElementById('withdraw-amt').value);
            if(amt < 5000 || amt > userState.balance) return customAlert("MINIMUM 5000 COINS REQUIRED");
            await addDoc(collection(db, "withdrawals"), { userId: auth.currentUser.uid, amount: amt, status: 'pending', date: serverTimestamp() });
            userState.balance -= amt;
            await updateDoc(doc(db, "users", auth.currentUser.uid), { balance: userState.balance });
            document.getElementById('balance-txt').innerText = userState.balance;
            customAlert("PAYOUT REQUESTED");
        };

        function customAlert(m) {
            document.getElementById('alert-msg').innerText = m;
            document.getElementById('alert-box').classList.remove('hidden');
        }
        window.closeAlert = () => document.getElementById('alert-box').classList.add('hidden');
        
        document.getElementById('to-signup').onclick = () => { document.getElementById('login-view').classList.add('hidden'); document.getElementById('signup-view').classList.remove('hidden'); };
        document.getElementById('to-login').onclick = () => { document.getElementById('signup-view').classList.add('hidden'); document.getElementById('login-view').classList.remove('hidden'); };
    </script>
</body>
</html>
