<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Rewards Pro</title>
    
    <!-- MONETAG GLOBAL SDK -->
    <script src='//libtl.com/sdk.js' data-zone='11214225' data-sdk='show_11214225'></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --accent: #fb923c; --bg: #050505; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #fff; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(23, 23, 23, 0.8); backdrop-filter: blur(20px); border: 1px solid #262626; }
        .gold-grad { background: linear-gradient(135deg, #fb923c 0%, #d97706 100%); }
        .main-view { display: none; min-height: 100vh; flex-direction: column; }
        .main-view.active { display: flex; }
        .tab-view { display: none; }
        .tab-view.active { display: block; animation: tabIn 0.4s ease; }
        @keyframes tabIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn { color: #404040; transition: 0.3s; }
        .nav-active { color: var(--accent); }
        input { background: #0a0a0a !important; border: 1px solid #222 !important; color: #fff !important; outline: none; }

        /* Banner Style */
        .bottom-ad-zone {
            width: 100%; min-height: 60px; background: #000;
            border-top: 1px solid #1a1a1a; display: flex;
            align-items: center; justify-content: center;
            position: fixed; bottom: 80px; z-index: 40;
        }
    </style>
</head>
<body class="max-w-md mx-auto">

    <!-- Preloader -->
    <div id="loader_scr" class="fixed inset-0 bg-black flex items-center justify-center z-[9999]">
        <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-orange-500"></div>
    </div>

    <!-- Auth View -->
    <div id="view_auth" class="main-view p-8 justify-center">
        <h1 class="text-4xl font-black italic text-orange-500 text-center mb-10 uppercase tracking-tighter italic">CASHREWARD</h1>
        <div id="box_login" class="space-y-4">
            <input id="f_l_email" type="email" placeholder="Email" class="w-full p-4 rounded-2xl border border-zinc-800">
            <input id="f_l_pass" type="password" placeholder="Password" class="w-full p-4 rounded-2xl border border-zinc-800">
            <button onclick="handleLogin()" class="w-full p-4 gold-grad text-black font-black rounded-2xl active:scale-95 shadow-xl">LOG IN</button>
            <p class="text-center text-xs text-zinc-500 mt-4 underline cursor-pointer" onclick="toggleScreens(true)">New User? Signup</p>
        </div>
        <div id="box_reg" class="hidden space-y-4">
            <input id="f_r_name" type="text" placeholder="Full Name" class="w-full p-4 rounded-2xl">
            <input id="f_r_email" type="email" placeholder="Email Address" class="w-full p-4 rounded-2xl">
            <input id="f_r_pass" type="password" placeholder="Password" class="w-full p-4 rounded-2xl">
            <button onclick="handleSignup()" class="w-full p-4 gold-grad text-black font-black rounded-2xl">CREATE ACCOUNT</button>
            <p class="text-center text-xs text-zinc-500 mt-4 underline cursor-pointer" onclick="toggleScreens(false)">Back to Login</p>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="view_dashboard" class="main-view pb-40">
        <header class="p-6 bg-black/90 backdrop-blur-md flex justify-between items-center border-b border-zinc-900 sticky top-0 z-50">
            <h1 class="font-black italic text-xl uppercase">Elite<span class="text-orange-500">PRO</span></h1>
            <div class="px-4 py-1.5 bg-zinc-900 border border-zinc-800 rounded-full font-black text-xs text-orange-500">
                ₹ <span id="txt_rupee">0.00</span>
            </div>
        </header>

        <main class="flex-grow p-6">
            <!-- Tab Home -->
            <div id="page_home" class="tab-view active space-y-6">
                <div class="glass p-10 rounded-[3rem] text-center border-orange-500/10 border">
                    <p class="text-zinc-600 text-[10px] font-black uppercase mb-1">Coin Wallet</p>
                    <h2 class="text-6xl font-black tracking-tighter" id="txt_coins">0</h2>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <!-- MONETAG VIDEO AD TASK -->
                    <div onclick="playVideoTask(50)" class="glass p-6 rounded-3xl text-center active:bg-orange-500 active:text-black transition-all">
                        <i data-lucide="play-circle" class="mx-auto mb-2 text-orange-500 w-8 h-8"></i>
                        <p class="font-black text-[10px] uppercase">Earn 50</p>
                    </div>
                    <div onclick="playVideoTask(100)" class="glass p-6 rounded-3xl text-center bg-orange-500 text-black shadow-lg">
                        <i data-lucide="zap" class="mx-auto mb-2 w-8 h-8"></i>
                        <p class="font-black text-[10px] uppercase italic">Big Video</p>
                    </div>
                </div>

                <div onclick="getDailyGift()" class="w-full glass p-5 rounded-2xl flex justify-between items-center border-l-2 border-orange-500">
                    <p class="font-bold text-sm">Daily Bonus Reward</p>
                    <span class="bg-orange-500/10 text-orange-500 px-3 py-1 rounded-full text-[10px] font-black tracking-tighter uppercase">Collect</span>
                </div>
            </div>

            <!-- Tab Wallet -->
            <div id="page_wallet" class="tab-view space-y-8">
                <h2 class="text-3xl font-black italic">CASHOUT</h2>
                <div class="glass p-8 rounded-[3rem] space-y-5">
                    <input id="in_pay_id" placeholder="Paytm or UPI ID" class="w-full p-4 rounded-xl border border-white/5">
                    <input id="in_pay_amt" type="number" placeholder="Enter Amount" class="w-full p-4 rounded-xl">
                    <button onclick="requestPayoutAd()" class="w-full p-5 gold-grad text-black font-black rounded-3xl uppercase tracking-widest shadow-xl">Withdraw</button>
                </div>
            </div>

        </main>

        <!-- BANNER ZONE -->
        <div class="bottom-ad-zone" id="container-11214225">
             <span class="text-[7px] font-black text-zinc-900 tracking-[5px]">ADVERTISEMENT</span>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 p-5 bg-black border-t border-zinc-900 grid grid-cols-3 z-50">
            <button onclick="switchTab('page_home')" class="nav-btn nav-active flex flex-col items-center gap-1" data-tab="page_home"><i data-lucide="layout-grid"></i></button>
            <button onclick="switchTab('page_wallet')" class="nav-btn flex flex-col items-center gap-1" data-tab="page_wallet"><i data-lucide="wallet"></i></button>
            <button onclick="logOutMaster()" class="nav-btn flex flex-col items-center gap-1 text-red-500/20"><i data-lucide="log-out"></i></button>
        </nav>
    </div>

    <!-- Alert Modal -->
    <div id="alert_box" class="hidden fixed inset-0 bg-[#000]/98 backdrop-blur-3xl z-[9999] flex flex-col items-center justify-center p-12 text-center">
        <p id="alert_msg" class="text-3xl font-black mb-10 italic uppercase text-orange-500"></p>
        <button onclick="dismissAlert()" class="gold-grad px-16 py-4 rounded-full text-black font-black uppercase shadow-2xl">Dismiss</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, setDoc, addDoc, serverTimestamp, collection } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        // CONFIG
        const firebaseConfig = { 
            apiKey: "AIzaSyCAVkef_IKMFfnvY3jonZthtJlz8_8W1I8", 
            authDomain: "task-and-earn-131ce.firebaseapp.com", 
            projectId: "task-and-earn-131ce", 
            storageBucket: "task-and-earn-131ce.firebasestorage.app", 
            messagingSenderId: "769440982357", 
            appId: "1:769440982357:web:e80bda0aeaeaf8a7f63bdc" 
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let uData = null;

        // AUTH SYSTEM
        onAuthStateChanged(auth, u => {
            if (u) {
                onSnapshot(doc(db, "users", u.uid), s => {
                    if (s.exists()) {
                        uData = s.data();
                        document.getElementById('txt_coins').innerText = (uData.coins || 0).toLocaleString();
                        document.getElementById('txt_rupee').innerText = (uData.rupees || 0).toFixed(2);
                        showFinalUI('view_dashboard');
                    } else {
                        setDoc(doc(db, "users", u.uid), { name: "User", email: u.email, coins: 50, rupees: 0, lastCheck: "" });
                    }
                });
                initInAppAds(); 
            } else { showFinalUI('view_auth'); }
            document.getElementById('loader_scr').style.display = 'none';
        });

        // 🟡 MONETAG REWARDED VIDEO TASK (Coin Earning)
        window.playVideoTask = (amt) => {
            if (typeof window.show_11214225 === 'function') {
                // Hum yahan sirf 'Reward Interstitial' (Default Video) call karenge
                window.show_11214225().then(async () => {
                    await updateDoc(doc(db, "users", auth.currentUser.uid), { coins: uData.coins + amt });
                    openAppAlert("EXCELLENT! +" + amt + " COINS");
                }).catch(() => openAppAlert("VIDEO NOT READY. TRY IN 5S"));
            }
        };

        // 🔵 MONETAG IN-APP (Permanent Banner Style)
        function initInAppAds() {
            if (typeof window.show_11214225 === 'function') {
                window.show_11214225({
                    type: 'inApp',
                    inAppSettings: { frequency: 2, capping: 0.1, interval: 30, timeout: 3, everyPage: false }
                });
            }
        }

        // 🔴 NAVIGATION/ACTION POPUPS (Wallets & Withdrawals)
        window.switchTab = (id) => {
            // Money task me distraction rokne ke liye yahan popup kam use hota hai
            if(window.show_11214225 && Math.random() > 0.8) window.show_11214225('pop').catch(()=>{}); 
            
            document.querySelectorAll('.tab-view').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('nav-active', b.dataset.tab === id));
        };

        window.requestPayoutAd = () => {
            const upi = document.getElementById('in_pay_id').value;
            const amt = parseInt(document.getElementById('in_pay_amt').value);
            if(!upi || !amt) return openAppAlert("INPUT MISSING");

            // Forced Non-rewarded pop before withdrawal
            if(window.show_11214225) {
                window.show_11214225('pop').finally(async () => {
                    await addDoc(collection(db, "withdrawals"), { userId: auth.currentUser.uid, amount: amt, upi: upi, status: 'pending', date: serverTimestamp() });
                    openAppAlert("SUCCESS! REQUEST SENT.");
                });
            }
        };

        // DAILY
        window.getDailyGift = async () => {
            const today = new Date().toLocaleDateString();
            if(uData.lastCheck === today) return openAppAlert("TOMORROW AGAIN");
            await updateDoc(doc(db, "users", auth.currentUser.uid), { coins: uData.coins + 100, lastCheck: today });
            openAppAlert("RECEIVED 100 COINS!");
        };

        // LOGIC UI
        window.handleLogin = () => signInWithEmailAndPassword(auth, f_l_email.value, f_l_pass.value).catch(err => openAppAlert(err.message));
        window.handleSignup = () => createUserWithEmailAndPassword(auth, f_r_email.value, f_r_pass.value).catch(err => openAppAlert(err.message));
        window.logOutMaster = () => signOut(auth);
        
        window.toggleScreens = isReg => {
            document.getElementById('box_login').classList.toggle('hidden', isReg);
            document.getElementById('box_reg').classList.toggle('hidden', !isReg);
        };
        function showFinalUI(id) {
            document.querySelectorAll('.main-view').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        window.openAppAlert = m => { document.getElementById('alert_msg').innerText = m; document.getElementById('alert_box').classList.remove('hidden'); };
        window.dismissAlert = () => document.getElementById('alert_box').classList.add('hidden');
        lucide.createIcons();
    </script>
</body>
</html>
